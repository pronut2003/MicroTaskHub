services:
  - type: web
    name: microtaskhub
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend/auth-service && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: "sqlite:///./microtaskhub.db"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
